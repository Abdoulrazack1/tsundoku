# Déploiement Render — service web Node (mono-serveur : sert l'API ET le front).
# Base de données MySQL externe (Aiven free tier) : renseigner DB_* dans le dashboard.
services:
  - type: web
    name: tsundoku
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci --omit=dev
    # Applique le schéma + amorce la base (si vide) puis démarre — aucune manip BDD.
    startCommand: node db/ensure-seed.js && node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # TLS requis par les bases managées gratuites (Aiven, TiDB…)
      - key: DB_SSL
        value: 'true'
      # --- À renseigner manuellement (base MySQL gratuite) ---
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ANILIST_USERNAME
        sync: false
      # SEO / Google (cf. README « Référencement Google »)
      - key: SITE_URL
        sync: false
      - key: GOOGLE_SITE_VERIFICATION
        sync: false
