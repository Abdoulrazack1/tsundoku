<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter — Tsundoku</title>
  <meta name="description" content="Reçois les nouvelles chroniques et dossiers manga de Tsundoku, une fois par mois.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/home.css">
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div data-navbar></div>
  <main id="main">
    <section class="section container">
      <div class="content newsletter" style="padding-top:calc(var(--nav-h) + var(--space-lg))">
        <p class="kicker" style="justify-content:center">Rejoindre la pile</p>
        <h1 class="newsletter__title" style="font-size:clamp(2.6rem,6vw,4.5rem)">La lettre des lectures</h1>
        <p class="newsletter__sub">Une fois par mois : les nouvelles chroniques, les dossiers de fond, les coups de cœur seinen — et un peu de silence entre les mots. Pas de spam, désabonnement en un clic.</p>
        <form class="newsletter__form js-newsletter" novalidate>
          <input class="input" type="email" name="email" placeholder="votre@email.fr" required aria-label="Adresse email">
          <button class="btn btn--solid" type="submit">S'abonner</button>
        </form>
        <p class="newsletter__msg" role="status" id="nl-msg"></p>
        <p class="text-muted" style="margin-top:var(--space-lg);font-size:.85rem">Tu préfères les flux ? <a href="/rss.xml" class="text-accent">Abonne-toi en RSS</a>.</p>
      </div>
    </section>
  </main>
  <div data-footer></div>
  <script type="module" src="/assets/js/main.js"></script>
  <script type="module">
    // Double opt-in : confirmation via ?token=
    import { api } from '/assets/js/core/api.js';
    const token = new URLSearchParams(location.search).get('token');
    if (token) {
      const msg = document.getElementById('nl-msg');
      api.get(`/newsletter/confirm/${token}`)
        .then((r) => { msg.style.color = 'var(--color-accent)'; msg.textContent = r.message || 'Abonnement confirmé !'; })
        .catch((e) => { msg.style.color = '#e74c3c'; msg.textContent = e.message || 'Lien invalide.'; });
    }
  </script>
</body>
</html>
