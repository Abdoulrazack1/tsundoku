<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En chiffres — Tsundoku</title>
  <meta name="description" content="Mon univers de lecture en données : genres, années, auteurs.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/author.css">

  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div data-navbar></div>
  <main id="main">
    <header class="page-head container">
      <p class="kicker">Le bilan</p>
      <h1 class="page-head__title">En chiffres</h1>
      <p class="page-head__sub">Mon univers de lecture, mesuré et mis en couleurs.</p>
      <hr class="rule">
    </header>
    <section class="section--tight container">
      <div class="stat-cards" id="stat-cards"><div class="spinner"></div></div>
      <div class="charts-grid" id="charts" hidden>
        <div class="chart-box"><h3 class="font-display">Répartition par genre</h3><canvas id="chart-genres"></canvas></div>
        <div class="chart-box"><h3 class="font-display">Livres lus par année</h3><canvas id="chart-years"></canvas></div>
        <div class="chart-box" style="grid-column:1/-1"><h3 class="font-display">Auteurs les plus présents</h3><canvas id="chart-authors"></canvas></div>
      </div>
    </section>
  </main>
  <div data-footer></div>
  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/pages/stats.js"></script>
</body>
</html>
