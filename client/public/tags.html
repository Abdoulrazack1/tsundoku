<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tags — Tsundoku</title>
  <meta name="description" content="Explorer les chroniques manga par thème et tag.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <style>
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 12px 14px; align-items: baseline; }
    .tag-cloud a { font-family: var(--font-display); color: var(--ink); transition: color var(--t-fast); line-height: 1.1; }
    .tag-cloud a:hover, .tag-cloud a.is-active { color: var(--color-accent); }
    .tag-cloud a small { font-family: var(--font-mono); font-size: .6em; color: var(--muted); vertical-align: super; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div data-navbar></div>
  <main id="main">
    <header class="page-head container">
      <p class="kicker">Explorer</p>
      <h1 class="page-head__title">Tags</h1>
      <p class="page-head__sub">Les fils qui relient les œuvres — thèmes, motifs, obsessions.</p>
      <hr class="rule">
    </header>
    <section class="section--tight container">
      <div class="tag-cloud" id="tag-cloud"><div class="spinner"></div></div>
      <div id="tag-results" style="margin-top:var(--space-xl)"></div>
    </section>
  </main>
  <div data-footer></div>
  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/pages/tags.js"></script>
</body>
</html>
