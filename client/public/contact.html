<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Tsundoku</title>
  <meta name="description" content="Une recommandation manga, une correction, une collaboration ? Écris à Tsundoku.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div data-navbar></div>
  <main id="main">
    <header class="page-head container">
      <p class="kicker">Échanger</p>
      <h1 class="page-head__title">Contact</h1>
      <p class="page-head__sub">Une recommandation seinen, une coquille à signaler, une collaboration ? Écris-moi — ou sur <a href="https://x.com/20thHeir" target="_blank" rel="noopener" class="text-accent">X @20thHeir</a>.</p>
      <hr class="rule">
    </header>
    <section class="section--tight container">
      <form class="contact-form measure" id="contact-form" novalidate style="display:grid;gap:var(--space-sm)">
        <div class="field"><label for="c-name">Nom</label><input class="input" id="c-name" name="name" required></div>
        <div class="field"><label for="c-email">Email</label><input class="input" id="c-email" type="email" name="email" required></div>
        <div class="field"><label for="c-subject">Sujet</label><input class="input" id="c-subject" name="subject" placeholder="Recommandation, correction…"></div>
        <div class="field"><label for="c-message">Message</label><textarea class="textarea" id="c-message" name="message" rows="6" required></textarea></div>
        <input type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0;height:0">
        <button class="btn btn--solid" type="submit" style="justify-self:start">Envoyer le message</button>
        <p class="newsletter__msg" role="status" id="contact-msg"></p>
      </form>
    </section>
  </main>
  <div data-footer></div>
  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/pages/contact.js"></script>
</body>
</html>
