<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intégrations — Tsundoku Admin</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Newsreader:opsz,wght@6..72,300..600&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/admin.css">
</head>
<body>
  <div class="admin">
    <div data-admin-sidebar></div>
    <main class="admin-main">
      <header class="admin-header"><h1 class="font-display">Intégrations</h1></header>
      <div class="editor-panel" style="max-width:640px">
        <h4>Anilist</h4>
        <p class="text-muted" style="margin-bottom:12px">Recherchez un manga via l'API GraphQL publique d'Anilist pour récupérer sa couverture et ses métadonnées.</p>
        <div style="display:flex;gap:8px">
          <input class="input" id="ani-q" placeholder="Ex : Berserk, Vagabond, Monster…">
          <button class="btn btn--solid" id="ani-go">Rechercher</button>
        </div>
        <div id="ani-res" style="margin-top:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px"></div>
        <button class="btn btn--sm" id="ani-sync" style="margin-top:16px">Lancer une synchronisation</button>
      </div>
    </main>
  </div>
  <script type="module" src="/assets/js/pages/admin/integrations.js"></script>
</body>
</html>
