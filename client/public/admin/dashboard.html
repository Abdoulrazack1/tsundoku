<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — Tsundoku Admin</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Newsreader:opsz,wght@6..72,300..600&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/admin.css">
  <link rel="stylesheet" href="/assets/css/pages/author.css">

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="admin">
    <div data-admin-sidebar></div>
    <main class="admin-main">
      <header class="admin-header">
        <h1 class="font-display">Tableau de bord</h1>
        <a class="btn btn--solid btn--sm" href="/admin/post-editor.html">+ Nouvel article</a>
      </header>

      <div class="kpi-grid" id="kpis"><div class="spinner"></div></div>

      <div class="chart-box" style="margin-top:var(--space-lg)">
        <h3 class="font-display">Vues — 30 derniers jours</h3>
        <canvas id="views-chart" height="90"></canvas>
      </div>

      <h2 class="font-display" style="margin:var(--space-lg) 0 var(--space-md)">Derniers articles</h2>
      <div id="posts-table"></div>

      <h2 class="font-display" style="margin:var(--space-lg) 0 var(--space-md)">Commentaires à modérer <span id="cmt-count" class="status-badge draft"></span></h2>
      <div id="comments-mod"></div>

      <h2 class="font-display" style="margin:var(--space-lg) 0 var(--space-md)">Messages de contact <span id="msg-count" class="status-badge draft"></span></h2>
      <div id="contact-mod"></div>
    </main>
  </div>
  <script type="module" src="/assets/js/pages/admin/dashboard.js"></script>
</body>
</html>
