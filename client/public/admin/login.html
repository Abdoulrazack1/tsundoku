<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Tsundoku Admin</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900&family=Newsreader:opsz,wght@6..72,300..600&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/admin.css">
</head>
<body>
  <main class="admin-login">
    <div class="admin-login__card">
      <a class="logo" href="/"><span class="logo__mark" style="width:60px;height:60px"><span class="logo__kanji" style="font-size:2rem">読</span></span></a>
      <h1 class="font-display" style="font-size:1.8rem;margin-top:var(--space-md)">Espace administration</h1>
      <p class="text-muted" style="margin-top:8px">Connectez-vous pour gérer Tsundoku.</p>
      <form id="login-form" novalidate>
        <div class="field"><label for="email">Email</label><input class="input" id="email" type="email" name="email" required autocomplete="username"></div>
        <div class="field"><label for="password">Mot de passe</label><input class="input" id="password" type="password" name="password" required autocomplete="current-password"></div>
        <button class="btn btn--solid btn--block" type="submit">Se connecter</button>
        <p class="field__error" id="login-error" role="alert"></p>
      </form>
    </div>
  </main>
  <script type="module" src="/assets/js/pages/admin/login.js"></script>
</body>
</html>
