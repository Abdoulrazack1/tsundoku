<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Médiathèque — Tsundoku Admin</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Newsreader:opsz,wght@6..72,300..600&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/admin.css">
  <style>
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--space-md); }
    .media-item { border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
    .media-item img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--line); cursor: zoom-in; }
    .media-item__bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; font-size: .7rem; color: var(--muted); }
    .media-item__bar button { color: #c0392b; }
    .dropzone { border: 2px dashed var(--line); border-radius: var(--radius-md); padding: var(--space-lg); text-align: center; color: var(--muted); cursor: pointer; transition: all var(--t-fast); margin-bottom: var(--space-lg); }
    .dropzone.is-over, .dropzone:hover { border-color: var(--color-accent); background: rgba(192,57,43,.04); }
  </style>
</head>
<body>
  <div class="admin">
    <div data-admin-sidebar></div>
    <main class="admin-main">
      <header class="admin-header"><h1 class="font-display">Médiathèque</h1></header>
      <div class="dropzone" id="dropzone">
        Glissez une image ici ou <strong>cliquez pour téléverser</strong>
        <input type="file" id="file-input" accept="image/*" multiple hidden>
      </div>
      <div class="media-grid" id="media-grid"><div class="spinner"></div></div>
    </main>
  </div>
  <script type="module" src="/assets/js/pages/admin/media.js"></script>
</body>
</html>
