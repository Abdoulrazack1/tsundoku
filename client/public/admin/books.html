<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livres — Tsundoku Admin</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Newsreader:opsz,wght@6..72,300..600&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <link rel="stylesheet" href="/assets/css/pages/admin.css">
</head>
<body>
  <div class="admin">
    <div data-admin-sidebar></div>
    <main class="admin-main">
      <header class="admin-header"><h1 class="font-display">Livres &amp; Mangas</h1></header>
      <div class="editor-grid">
        <div>
          <h2 class="font-display" style="margin-bottom:var(--space-md)">Bibliothèque</h2>
          <div id="books-table"></div>
        </div>
        <aside class="editor-aside">
          <div class="editor-panel">
            <h4>Ajouter une œuvre</h4>
            <details style="margin-bottom:12px">
              <summary class="btn btn--sm btn--block" style="list-style:none">Importer depuis Anilist</summary>
              <div style="margin-top:10px">
                <input class="input" id="ani-q" placeholder="Titre du manga…">
                <button class="btn btn--sm btn--block" id="ani-go" style="margin-top:8px">Rechercher</button>
                <div id="ani-res" style="margin-top:10px;display:grid;gap:8px;max-height:240px;overflow:auto"></div>
              </div>
            </details>
            <form id="book-form" style="display:grid;gap:10px">
              <input class="input" id="b-title" placeholder="Titre *" required>
              <input class="input" id="b-author" placeholder="Auteur *" list="authors-list" required>
              <datalist id="authors-list"></datalist>
              <div style="display:flex;gap:8px">
                <input class="input" id="b-year" placeholder="Année" type="number" style="width:50%">
                <input class="input" id="b-pages" placeholder="Pages" type="number" style="width:50%">
              </div>
              <input class="input" id="b-publisher" placeholder="Éditeur">
              <select class="select" id="b-status">
                <option value="a_lire">À lire</option><option value="en_cours">En cours</option>
                <option value="lu">Lu</option><option value="relu">Relu</option><option value="abandonne">Abandonné</option>
              </select>
              <input class="input" id="b-rating" placeholder="Note /5" type="number" step="0.5" min="0" max="5">
              <textarea class="textarea" id="b-synopsis" rows="3" placeholder="Synopsis"></textarea>
              <label class="btn btn--sm btn--block" style="cursor:pointer">Couverture (upload)<input type="file" id="b-cover-file" accept="image/*" hidden></label>
              <img id="b-cover-prev" alt="" style="width:100px;aspect-ratio:2/3;object-fit:cover;border-radius:4px;display:none">
              <button class="btn btn--solid btn--block" type="submit">Ajouter le livre</button>
              <p class="field__error" id="book-msg" role="status"></p>
            </form>
          </div>
        </aside>
      </div>
    </main>
  </div>
  <script type="module" src="/assets/js/pages/admin/books.js"></script>
</body>
</html>
