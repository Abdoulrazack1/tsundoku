<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chroniques — Tsundoku</title>
  <meta name="description" content="Toutes les chroniques de lecture de Tsundoku : romans, essais, littérature japonaise et plus.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">

  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Aller au contenu</a>
  <div data-navbar></div>

  <main id="main">
    <header class="page-head container">
      <p class="kicker">Le journal</p>
      <h1 class="page-head__title" id="page-title">Chroniques</h1>
      <p class="page-head__sub" id="articles-count">Toutes les lectures, par ordre du plus récent.</p>
      <div class="type-tabs" id="type-tabs"></div>
      <hr class="rule">
    </header>

    <div class="filter-bar">
      <div class="container filter-bar__inner">
        <div class="filter-group" id="cat-filters"></div>
        <div class="filter-group filter-bar__tools">
          <select class="select select--inline" id="rating-select" aria-label="Note minimale">
            <option value="">Toutes notes</option>
            <option value="4">4★ et +</option>
            <option value="3">3★ et +</option>
          </select>
          <select class="select select--inline" id="sort-select" aria-label="Trier">
            <option value="newest">Plus récent</option>
            <option value="oldest">Plus ancien</option>
            <option value="top_rated">Mieux noté</option>
            <option value="most_viewed">Plus lu</option>
          </select>
          <div class="view-toggle" role="group" aria-label="Affichage">
            <button class="view-toggle__btn is-active" data-view="grid" aria-label="Vue grille"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
            <button class="view-toggle__btn" data-view="list" aria-label="Vue liste"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
          </div>
        </div>
      </div>
    </div>

    <section class="section--tight container">
      <div class="grid-cards" id="articles-grid"><div class="spinner"></div></div>
      <div id="pagination"></div>
    </section>
  </main>

  <div data-footer></div>

  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/pages/articles.js"></script>
</body>
</html>
