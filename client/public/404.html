<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page égarée — Tsundoku</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Space+Grotesk:wght@300..700&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/dark-mode.css">
  <style>
    .err { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: var(--space-lg); position: relative; overflow: hidden; }
    .err__kanji { font-family: var(--font-jp); font-size: clamp(12rem, 40vw, 30rem); line-height: 1; color: var(--ink); opacity: 0.05; position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
    .err__code { font-family: var(--font-display); font-weight: 300; font-size: clamp(5rem, 18vw, 12rem); line-height: 1; letter-spacing: -0.04em; }
    .err__msg { font-family: var(--font-serif); font-size: 1.3rem; color: var(--muted); max-width: 40ch; margin: var(--space-md) auto var(--space-lg); }
    .err__inner { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div data-navbar></div>
  <main id="main">
    <section class="err">
      <div class="err__kanji" aria-hidden="true">迷</div>
      <div class="err__inner">
        <p class="kicker">Erreur 404</p>
        <h1 class="err__code">404</h1>
        <p class="err__msg">Ce livre semble avoir été égaré dans la pile. La page que vous cherchez n'existe pas — ou n'a pas encore été écrite.</p>
        <a class="btn btn--solid" href="/">Retour à l'accueil
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
    </section>
  </main>
  <div data-footer></div>
  <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
